# 生产/离线部署：仅拉取已构建镜像，不在目标环境执行 build。
#
# 镜像通过环境变量指定（.env 或 shell）：
#   CLOUD_FITTER_APP_IMAGE  — 后端镜像（必填，无默认值）
#   CLOUD_FITTER_WEB_IMAGE  — 前端 Nginx 镜像（必填，无默认值）
#
# 示例：
#   docker compose -f docker-compose-deploy.yml --env-file .env.deploy up -d
#
# 或：
#   set CLOUD_FITTER_APP_IMAGE=registry.example.com/rdd/cloud-fitter-app:1.2.3
#   set CLOUD_FITTER_WEB_IMAGE=registry.example.com/rdd/cloud-fitter-web:1.2.3
#   docker compose -f docker-compose-deploy.yml up -d
#
# 部署前：准备 config.yaml；SQLite 数据目录见 CLOUD_FITTER_DATA_DIR。
# 访问：Web http://<宿主机>:8089；API 9090 / 9091

services:
  app:
    image: ${CLOUD_FITTER_APP_IMAGE:?required}
    container_name: cloud-fitter-app
    restart: unless-stopped
    environment:
      CLOUD_FITTER_ENV_TAG_KEY: ${CLOUD_FITTER_ENV_TAG_KEY:-}
      CLOUD_FITTER_NODE_TAG_KEY: ${CLOUD_FITTER_NODE_TAG_KEY:-}
      CLOUD_FITTER_CMDB_BASE_URL: ${CLOUD_FITTER_CMDB_BASE_URL:-}
      CLOUD_FITTER_CMDB_KEY: ${CLOUD_FITTER_CMDB_KEY:-}
      CLOUD_FITTER_CMDB_SECRET: ${CLOUD_FITTER_CMDB_SECRET:-}
    networks:
      - app
    ports:
      - "${CLOUD_FITTER_APP_PORT_HTTP:-9090}:9090"
      - "${CLOUD_FITTER_APP_PORT_GRPC:-9091}:9091"
    volumes:
      - ${CLOUD_FITTER_CONFIG_PATH:-./config.yaml}:/app/config/config.yaml:ro
      - ${CLOUD_FITTER_DATA_DIR:-./data}:/app/data

  web:
    image: ${CLOUD_FITTER_WEB_IMAGE:?required}
    container_name: cloud-fitter-web
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - app
    ports:
      - "${CLOUD_FITTER_WEB_PORT:-8089}:8089"
    volumes:
      - ${CLOUD_FITTER_NGINX_COMPOSE_CONF:-./deploy/web/nginx.compose.conf}:/etc/nginx/conf.d/default.conf:ro

networks:
  app:
    driver: bridge
