syntax = "proto3";
package pboss;

option go_package = "github.com/cloud-fitter/cloud-fitter/gen/idl/pboss";

import "idl/pbtenant/tenant.proto";
import "google/api/annotations.proto";

message OssInstance {
  // 云类型
  pbtenant.CloudProvider provider = 1;
  // 账号名称
  string account_name = 2;
  // bucket名称
  string bucket_name = 3;
  // 区域
  string location = 4;
  // 创建时间（RFC3339）
  string creation_time = 5;
  // 桶类型（如华为 OBS 的 OBJECT/FS 等）
  string bucket_type = 6;
  // 存储类别（如标准、低频等，以云厂商返回为准）
  string storage_class = 7;
  // 所有者 ID
  string owner_id = 8;
  // 所有者显示名
  string owner_display_name = 9;
}

message ListDetailReq {
  // 云名称
  pbtenant.CloudProvider provider = 1;
  // 账户名称，根据config.yaml中的配置，默认为第一个配置的账户
  string account_name = 2;
  // 分页相关参数，页码
  int32 page_number = 3;
  // 分页相关参数，每页数量
  int32 page_size = 4;
  // 分页相关参数，下一页的token
  string next_token = 5;
}

message ListDetailResp {
  // Oss 机器集合
  repeated OssInstance osses = 1;
  // 查询是否完成，如果为否-false，则可以将下面三个分页参数填入到请求中，继续查询
  bool finished = 2;
  // 分页相关参数，页码
  int32 page_number = 3;
  // 分页相关参数，每页数量
  int32 page_size = 4;
  // 分页相关参数，下一页的token
  string next_token = 5;
  // 请求id，出现问题后提供给云厂商，排查问题
  string request_id = 6;
}

message ListReq {
  // 云名称
  pbtenant.CloudProvider provider = 1;
}

message ListResp {
  // Oss 机器集合
  repeated OssInstance osses = 1;
}

message ListAllReq {}

// OSS类产品接口
// 阿里云 - OSS
service OssService {

  // 查询OSS明细  - 支持云类型、账户、分页等过滤条件
  rpc ListOssDetail(ListDetailReq) returns (ListDetailResp) {
    option (google.api.http) = {
      post : "/apis/oss/detail"
      body : "*"
    };
  }

  // 查询OSS全量 - 根据云类型
  rpc ListOss(ListReq) returns (ListResp) {
    option (google.api.http) = {
      post : "/apis/oss"
      body : "*"
    };
  }

  // 查询 OSS 全量 - 聚合所有已配置云账号
  rpc ListOssAll(ListAllReq) returns (ListResp) {
    option (google.api.http) = {
      post : "/apis/oss/all"
      body : "*"
    };
  }
}