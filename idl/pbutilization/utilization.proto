syntax = "proto3";
package pbutilization;

option go_package = "github.com/cloud-fitter/cloud-fitter/gen/idl/pbutilization";

// 某一时间窗口内资源使用率统计（百分比 0–100，来自云监控聚合序列再统计峰/均/谷）。
message UtilizationWindow {
  double peak_percent = 1;
  double avg_percent = 2;
  double min_percent = 3;
  // 是否在窗口内成功拉取到至少一个有效监控点
  bool available = 4;
}

// ECS / RDS：CPU 与内存各两个窗口（约 30 天、约 180 天）。
message ComputeUtilizationAudit {
  UtilizationWindow cpu_last_30d = 1;
  UtilizationWindow cpu_last_180d = 2;
  UtilizationWindow mem_last_30d = 3;
  UtilizationWindow mem_last_180d = 4;
}

// DCS（Redis）：仅内存利用率两个窗口。
message MemoryUtilizationAudit {
  UtilizationWindow mem_last_30d = 1;
  UtilizationWindow mem_last_180d = 2;
}
