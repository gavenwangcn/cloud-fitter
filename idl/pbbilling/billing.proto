syntax = "proto3";
package pbbilling;

option go_package = "github.com/cloud-fitter/cloud-fitter/gen/idl/pbbilling";

import "idl/pbtenant/tenant.proto";
import "google/api/annotations.proto";

message BillingInstance {
  // 云类型
  pbtenant.CloudProvider provider = 1;
  // 计费周期
  string billing_cycle = 2;
  // 账号名称
  string account_name = 3;
  // 区域名称
  string region_name = 4;
  // 产品类型
  string product_code = 5;
  // 产品类型
  string product_type = 6;
  // 产品ID
  string instance_id = 7;
  // 产品费用
  double fee = 8;
  // 账单类型： SubscriptionOrder (预付订单) PayAsYouGoBill (后付账单) Refund (退款) Adjustment (调账)
  string item = 9;
  // 实例昵称
  string instance_name = 10;
  // 订阅类型：Subscription：预付费 PayAsYouGo：后付费
  string subscription_type = 11;
}

message AliProductInfo {
  // 产品代码
  string product_code = 1;
  // 产品名称
  string product_name = 2;
  // 产品类型
  string product_type = 3;
  // 订阅类型。取值：Subscription：预付费 / PayAsYouGo：后付
  string subscription_type = 4;
}

message ListDetailReq {
  // 云名称
  pbtenant.CloudProvider provider = 1;
  // 计费周期,格式为 YYYY-MM
  string billing_cycle = 2;
  // 账户名称，根据config.yaml中的配置，默认为第一个配置的账户
  string account_name = 3;
}

message ListDetailResp {
  // Billing 集合
  repeated BillingInstance billings = 1;
}

message ListReq {
  // 云名称
  pbtenant.CloudProvider provider = 1;
  // 计费周期,格式为 YYYY-MM
  string billing_cycle = 2;
}

message ListResp {
  // Billing 集合
  repeated BillingInstance billings = 1;
}

// 按资源大类汇总的消费总账（如 ECS、RDS、DCS），金额单位与云厂商账单一致（通常为「元」）。
message BillingCategoryRow {
  pbtenant.CloudProvider provider = 1;
  string account_name = 2;
  string billing_cycle = 3;
  // 大类展示名：ECS、RDS、DCS、DMS、CCE、其他
  string category = 4;
  // 该大类应付/消费金额合计
  double total_consume_amount = 5;
  string currency = 6;
  // 参与汇总的原始账单行数
  int32 source_row_count = 7;
}

message ListBillingSummaryReq {
  pbtenant.CloudProvider provider = 1;
  // 账期 YYYY-MM（东八区自然月）
  string billing_cycle = 2;
  string account_name = 3;
}

message ListBillingSummaryResp {
  repeated BillingCategoryRow rows = 1;
  double grand_total_consume = 2;
  string currency = 3;
}

// 计费接口
// 阿里云 - bssopenapi
service BillingService {

  // 查询费用明细  - 支持云类型、账户过滤条件
  rpc ListBillingDetail(ListDetailReq) returns (ListDetailResp) {
    option (google.api.http) = {
      post : "/apis/billing/detail"
      body : "*"
    };
  }

  // 查询费用全量 - 根据云类型
  rpc ListBilling(ListReq) returns (ListResp) {
    option (google.api.http) = {
      post : "/apis/billing"
      body : "*"
    };
  }

  // 按 ECS/RDS/DCS 等大类的月度消费汇总（阿里云/腾讯云由明细聚合；华为云走 BSS 汇总账单接口）
  rpc ListBillingSummary(ListBillingSummaryReq) returns (ListBillingSummaryResp) {
    option (google.api.http) = {
      post : "/apis/billing/summary"
      body : "*"
    };
  }
}