syntax = "proto3";
package pbredis;

option go_package = "github.com/cloud-fitter/cloud-fitter/gen/idl/pbredis";

import "idl/pbtenant/tenant.proto";
import "idl/pbutilization/utilization.proto";
import "google/api/annotations.proto";

message RedisInstance {
  // 云类型
  pbtenant.CloudProvider provider = 1;
  // 账号名称
  string accout_name = 2;
  // 实例id
  string instance_id = 3;
  // 实例名称
  string instance_name = 4;
  // 地域，数据中心
  string region_name = 5;
  // 实例容量大小，单位:MB
  int32 size = 6;
  // 状态
  string status = 7;
  // 创建时间，ISO8601
  string creation_time = 8;
  // 过期时间
  string expire_time = 9;
  // 产品规格编码（华为 DCS spec_code，可对照规格表看 CPU）
  string spec_code = 10;
  string vpc_id = 11;
  repeated string public_ips = 12;
  repeated string private_ips = 13;
  // 已用内存 MB（华为 DCS used_memory）
  int32 used_memory_mb = 14;
  string charge_type = 15;
  // vCPU 核数（华为 DCS：由 ListFlavors 按 spec_code 解析）
  int32 cpu = 16;
  // 环境标识：指定标签键的值（CLOUD_FITTER_REDIS_ENV_TAG_KEY / CLOUD_FITTER_ENV_TAG_KEY）
  string env_tag_value = 17;
  // 节点标签值（见 CLOUD_FITTER_NODE_TAG_KEY，默认键名 node）
  string node_tag_value = 18;
  // 内存与磁盘利用率审计（DCS）；华为云 CES memory_usage、disk_util_inband 等，其它云未填充
  pbutilization.MemoryUtilizationAudit memory_utilization_audit = 19;
}

message ListDetailReq {
  // 云名称
  pbtenant.CloudProvider provider = 1;
  // 账户名称，根据config.yaml中的配置，默认为第一个配置的账户
  string account_name = 2;
  // 区域Id，参考 tenant.proto 中的各个云的区域
  int32 region_id = 3;
  // 分页相关参数，页码
  int32 page_number = 4;
  // 分页相关参数，每页数量
  int32 page_size = 5;
  // 分页相关参数，下一页的token
  string next_token = 6;
}

message ListDetailResp {
  // Redis 机器集合
  repeated RedisInstance redises = 1;
  // 查询是否完成，如果为否-false，则可以将下面三个分页参数填入到请求中，继续查询
  bool finished = 2;
  // 分页相关参数，页码
  int32 page_number = 3;
  // 分页相关参数，每页数量
  int32 page_size = 4;
  // 分页相关参数，下一页的token
  string next_token = 5;
  // 请求id，出现问题后提供给云厂商，排查问题
  string request_id = 6;
}

message ListReq {
  // 云名称
  pbtenant.CloudProvider provider = 1;
}

message ListResp {
  // Redis 机器集合
  repeated RedisInstance redises = 1;
}

message ListAllReq {}

// Redis类产品接口
// 阿里云 - Redis
// 腾讯云 - CDB
service RedisService {

  // 查询Redis明细 - 支持云类型、区域、账户、分页等过滤条件
  rpc ListRedisDetail(ListDetailReq) returns (ListDetailResp) {
    option (google.api.http) = {
      post : "/apis/redis/detail"
      body : "*"
    };
  }

  // 查询Redis全量 - 根据云类型
  rpc ListRedis(ListReq) returns (ListResp) {
    option (google.api.http) = {
      post : "/apis/redis"
      body : "*"
    };
  }

  // 查询所有云的 Redis（华为云 DCS 等）
  rpc ListRedisAll(ListAllReq) returns (ListResp) {
    option (google.api.http) = {
      post : "/apis/redis/all"
      body : "*"
    };
  }
}