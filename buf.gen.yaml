version: v1
plugins:
  # 版本与仓库既有 grpc-gateway v2.3 / protobuf 生成风格尽量接近，降低与当前 go.mod 不兼容概率
  - plugin: buf.build/protocolbuffers/go:v1.28.1
    out: gen
    opt:
      - paths=source_relative
  - plugin: buf.build/grpc/go:v1.3.0
    out: gen
    opt:
      - paths=source_relative
  - plugin: buf.build/grpc-ecosystem/grpc-gateway:v2.3.0
    out: gen
    opt:
      - paths=source_relative
  - plugin: buf.build/grpc-ecosystem/openapiv2:v2.3.0
    out: gen/openapiv2
