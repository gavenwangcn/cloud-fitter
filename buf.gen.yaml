version: v1
plugins:
  # 远程插件须用 buf.build/grpc-ecosystem/gateway（勿写 grpc-gateway，BSR 已弃用该插件名）
  - plugin: buf.build/protocolbuffers/go:v1.28.1
    out: gen
    opt:
      - paths=source_relative
  - plugin: buf.build/grpc/go:v1.3.0
    out: gen
    opt:
      - paths=source_relative
  # BSR 上插件名为 gateway，非 grpc-gateway（旧名会报 plugin not found）
  # 远程插件版本与 go.mod 中 github.com/grpc-ecosystem/grpc-gateway/v2 保持一致（当前 v2.16.2）
  - plugin: buf.build/grpc-ecosystem/gateway:v2.16.2
    out: gen
    opt:
      - paths=source_relative
  - plugin: buf.build/grpc-ecosystem/openapiv2:v2.16.2
    out: gen/openapiv2
