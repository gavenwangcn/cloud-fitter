# 默认前后端一起：根目录 .env 中 COMPOSE_PROFILES=full（见该文件）
#
#   docker compose up -d --build
#
# 前端源码须在本仓库 cloud-fitter-web/ 目录内提交（含 package.json），勿仅用子模块空引用
#
# 仅需后端：清空或删除 .env 里的 COMPOSE_PROFILES，或执行 docker compose up -d --build app
#
# 准备配置：复制 config_template.yaml 为 config.yaml 并填写云账号
# SQLite（界面「配置管理」写入的账号）默认落在容器 /app/data/cloud-fitter.db，
#   通过 CLOUD_FITTER_DATA_DIR 挂载到宿主机，重启/重建容器后仍会保留（见根目录 .env）
# 访问：前端 http://<宿主机>:8089；API 直连 9090/9091

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      # BuildKit 默认附加 provenance/SBOM（OCI 清单），华为云 SWR 部分实例会报错 fail to parse manifest.json；推送前关闭
      provenance: false
      sbom: false
    image: cloud-fitter-app:local
    container_name: cloud-fitter-app
    restart: unless-stopped
    # 统一环境类标签键；不设则默认键名 environment。节点类标签键；不设则默认 node（与 CMDB 系统节点/列表「节点(标签)」一致）
    environment:
      CLOUD_FITTER_ENV_TAG_KEY: ${CLOUD_FITTER_ENV_TAG_KEY:-}
      CLOUD_FITTER_NODE_TAG_KEY: ${CLOUD_FITTER_NODE_TAG_KEY:-}
      # 与根目录 .env 中 CLOUD_FITTER_CMDB_* 一致，供后端 CMDB 定时同步使用
      CLOUD_FITTER_CMDB_BASE_URL: ${CLOUD_FITTER_CMDB_BASE_URL:-}
      CLOUD_FITTER_CMDB_KEY: ${CLOUD_FITTER_CMDB_KEY:-}
      CLOUD_FITTER_CMDB_SECRET: ${CLOUD_FITTER_CMDB_SECRET:-}
    networks:
      - app
    ports:
      - "9090:9090" # HTTP（grpc-gateway）
      - "9091:9091" # gRPC
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro
      - ${CLOUD_FITTER_DATA_DIR:-./data}:/app/data

  web:
    profiles: [ "full" ]
    build:
      context: .
      dockerfile: deploy/web/Dockerfile
      provenance: false
      sbom: false
      args:
        WEB_SUBDIR: ${CLOUD_FITTER_WEB_SUBDIR:-cloud-fitter-web}
    image: cloud-fitter-web:local
    container_name: cloud-fitter-web
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - app
    ports:
      - "8089:8089"
    volumes:
      - ./deploy/web/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro

# 显式网络：app / web 在同一桥接网络，服务名 app、web 可作 DNS（nginx 里 proxy_pass http://app:9090）
networks:
  app:
    driver: bridge
