# 默认仅后端 api（适合云服务器只克隆本仓库、无前端子目录的场景）
#
#   docker compose up -d --build
#
# 需要带 Nginx 前端时：先把前端放到仓库根下的 cloud-fitter-web（或设 CLOUD_FITTER_WEB_SUBDIR），再启用 profile web：
#
#   git clone https://github.com/cloud-fitter/cloud-fitter-web.git cloud-fitter-web
#   docker compose --profile web up -d --build
#
# 前端与后端同级目录时，可在本仓库根执行：ln -snf ../cloud-fitter-web cloud-fitter-web
# 或在本目录 .env 写：COMPOSE_PROFILES=web（仍需存在上述目录）
#
# 准备配置：复制 config_template.yaml 为 config.yaml 并填写云账号
# api 构建会 buf generate（见 Dockerfile）；带 web 时访问 http://localhost:8080，直连 API：9090/9091

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloud-fitter-api:local
    container_name: cloud-fitter-api
    restart: unless-stopped
    ports:
      - "9090:9090" # HTTP（grpc-gateway）
      - "9091:9091" # gRPC
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro

  web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: deploy/web/Dockerfile
      args:
        WEB_SUBDIR: ${CLOUD_FITTER_WEB_SUBDIR:-cloud-fitter-web}
    image: cloud-fitter-web:local
    container_name: cloud-fitter-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/web/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
