# 整体启动后端 cloud-fitter + 前端 cloud-fitter-web
#
# 前端构建：context 为 cloud-fitter 仓库根目录，源码在子目录 cloud-fitter-web（可改 WEB_SUBDIR）
#   git clone https://github.com/cloud-fitter/cloud-fitter-web.git cloud-fitter-web
# 若前端与后端同级目录，可在 cloud-fitter 根下执行：ln -s ../cloud-fitter-web cloud-fitter-web
#
# 准备配置：在本仓库根目录复制 config_template.yaml 为 config.yaml 并填写云账号
#
# 启动：docker compose up -d --build
# 说明：api 镜像构建时会执行 buf generate（见 Dockerfile），仅改 idl/ 也会得到新 gen/ 再编译
# 访问：http://localhost:8080  （前端）；API 经 Nginx /apis 转发至 api:9090；宿主机与容器端口一致

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloud-fitter-api:local
    container_name: cloud-fitter-api
    restart: unless-stopped
    ports:
      - "9090:9090" # HTTP（grpc-gateway）
      - "9091:9091" # gRPC
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro

  web:
    build:
      context: .
      dockerfile: deploy/web/Dockerfile
      args:
        WEB_SUBDIR: ${CLOUD_FITTER_WEB_SUBDIR:-cloud-fitter-web}
    image: cloud-fitter-web:local
    container_name: cloud-fitter-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/web/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
