# 整体启动后端 cloud-fitter + 前端 cloud-fitter-web
#
# 前端构建 context 目录（相对本 compose 所在目录 = cloud-fitter 仓库根）：
#   默认 ./cloud-fitter-web（在仓库内克隆前端）
# dockerfile 路径相对「context 目录」解析（Compose 规范），因此指向仓库内 Dockerfile 用 ../deploy/web/Dockerfile
# 若前端与后端同级（例：~/cloud-fitter 与 ~/cloud-fitter-web），请：
#   export CLOUD_FITTER_WEB_DIR=../cloud-fitter-web
#   export CLOUD_FITTER_WEB_DOCKERFILE=../cloud-fitter/deploy/web/Dockerfile
#
# 准备配置：在本仓库根目录复制 config_template.yaml 为 config.yaml 并填写云账号
#
# 启动：docker compose up -d --build
# 说明：api 镜像构建时会执行 buf generate（见 Dockerfile），仅改 idl/ 也会得到新 gen/ 再编译
# 访问：http://localhost:8080  （前端）；API 经 Nginx /apis 转发至 api:9090；宿主机与容器端口一致

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cloud-fitter-api:local
    container_name: cloud-fitter-api
    restart: unless-stopped
    ports:
      - "9090:9090" # HTTP（grpc-gateway）
      - "9091:9091" # gRPC
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro

  web:
    build:
      context: ${CLOUD_FITTER_WEB_DIR:-./cloud-fitter-web}
      dockerfile: ${CLOUD_FITTER_WEB_DOCKERFILE:-../deploy/web/Dockerfile}
    image: cloud-fitter-web:local
    container_name: cloud-fitter-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/web/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
